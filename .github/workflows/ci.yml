name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - uses: Swatinem/rust-cache@v2
      - run: nix-shell shell.nix --run "cargo test --workspace"

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - uses: Swatinem/rust-cache@v2
      - run: nix-shell shell.nix --run "cargo clippy --workspace --all-targets -- -W clippy::pedantic -D warnings"

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - run: nix-shell shell.nix --run "cargo fmt --check"
